<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="layout">
    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Arcade Drop</p>
        <h1>테트리스</h1>
        <p class="subtitle">게임 화면 중심으로 바로 플레이할 수 있게 정리한 클래식 블록 퍼즐</p>
      </div>

      <div class="controls">
        <h2>조작법</h2>
        <ul>
          <li><span>← →</span> 이동</li>
          <li><span>↓</span> 빠르게 내리기</li>
          <li><span>↑ / X</span> 회전</li>
          <li><span>Z</span> 반대 회전</li>
          <li><span>Space</span> 즉시 낙하</li>
          <li><span>P</span> 일시정지</li>
        </ul>
      </div>
    </section>

    <section class="game-shell">
      <div class="board-wrap panel">
        <canvas id="board" width="300" height="600" aria-label="테트리스 게임 보드"></canvas>
        <div id="overlay" class="overlay">
          <div>
            <p id="overlay-title">시작 준비</p>
            <p id="overlay-text">방향키로 블록을 움직여보세요</p>
            <button id="start-button">게임 시작</button>
          </div>
        </div>
      </div>

      <aside class="side-panel">
        <div class="panel score-panel">
          <h2>상태</h2>
          <div class="stats">
            <div>
              <span>점수</span>
              <strong id="score">0</strong>
            </div>
            <div>
              <span>레벨</span>
              <strong id="level">1</strong>
            </div>
            <div>
              <span>라인</span>
              <strong id="lines">0</strong>
            </div>
          </div>
        </div>

        <div class="panel next-panel">
          <h2>다음 블록</h2>
          <canvas id="next" width="160" height="160" aria-label="다음 블록 미리보기"></canvas>
          <button id="sound-button" class="secondary ghost">사운드 켜짐</button>
          <button id="pause-button" class="secondary">일시정지</button>
        </div>
      </aside>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
